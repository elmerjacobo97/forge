packages:
  - "apps/*"
  - "functions/*"
  - "packages/*"

allowBuilds:
  esbuild: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@rollup/rollup-*"
  - "@tailwindcss/oxide-*"
trustPolicy: no-downgrade
trustPolicyExclude:
  - "semver"
  # eslint-config-next pulls 3.10.1, which lost provenance vs earlier 3.x releases
  - "eslint-import-resolver-typescript"
