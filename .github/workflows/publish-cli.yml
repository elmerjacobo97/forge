name: Publish forge-cli

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # Required for npm Trusted Publishing (OIDC)

concurrency:
  group: publish-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, test, and publish @codigoconelmer/forge-cli
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must point to a commit that is already on origin/main (got $GITHUB_SHA)."
            exit 1
          fi
          echo "OK: $GITHUB_SHA is an ancestor of origin/main"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          # Never cache package managers on release builds (npm trusted publishing guidance)
          cache: ""

      - name: Upgrade npm for Trusted Publishing (OIDC)
        run: |
          set -euo pipefail
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches apps/cli version
        run: pnpm check-cli-release-tag -- "${GITHUB_REF_NAME}"

      - name: Build CLI
        run: pnpm build:cli

      - name: Test CLI
        run: pnpm test:cli

      - name: Publish to npm (Trusted Publishing + provenance)
        working-directory: apps/cli
        run: npm publish --access public --provenance
